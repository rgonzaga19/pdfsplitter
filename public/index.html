<!DOCTYPE html>
<html>
<head>
    <title>PDF Splitter</title>
    <link rel="stylesheet" href="style.css">
    <link
    rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
</head>
<body>

<h1>PDF Splitter</h1>

<div class="toolbar">

    <input
        type="file"
        id="pdfFile"
        accept=".pdf"
        hidden
    >
    <label for="pdfFile" class="file-picker-btn">Choose File</label>
    <span id="fileLabel" class="file-label">No file chosen</span>

    <button
        id="refreshBtn"
    >
        <span class="material-symbols-rounded">refresh</span>
    </button>

    <button
        id="splitBtn"
        disabled
    >
        Split PDF
    </button>

</div>

<div id="stats"></div>

<div id="pages"></div>

<div id="successMessage" class="success-message" role="dialog" aria-modal="true" aria-labelledby="successTitle">
    <div class="success-message-content">
        <span class="material-symbols-rounded success-icon">check_circle</span>
        <h2 id="successTitle">Split successful</h2>
        <p>Your split PDF files have been downloaded as a ZIP file.</p>
        <button id="successOkBtn" type="button">Okay</button>
    </div>
</div>

<div id="previewModal" class="modal">

    <span id="closeModal">&times;</span>

    <div class="modal-content">

        <button id="prevPreviewBtn" class="preview-nav">
            <span class="material-symbols-rounded">chevron_left</span>
        </button>

        <button id="rotatePreviewBtn" class="preview-rotate">
            <span class="material-symbols-rounded">rotate_right</span>
        </button>

        <canvas id="previewCanvas"></canvas>

        <button id="nextPreviewBtn" class="preview-nav">
            <span class="material-symbols-rounded">chevron_right</span>
        </button>



    </div>

</div>

<script src="./pdfjs/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="app.js"></script>

</body>
</html>
