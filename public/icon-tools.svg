<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#bgGrad)"/>

  <!-- document -->
  <rect x="166" y="90" width="180" height="250" rx="18" fill="#ffffff"/>
  <!-- folded corner -->
  <path d="M 306 90 L 346 90 L 346 130 Z" fill="#bfdbfe"/>

  <!-- content lines -->
  <rect x="186" y="176" width="140" height="14" rx="7" fill="#93c5fd"/>
  <rect x="186" y="206" width="140" height="14" rx="7" fill="#93c5fd"/>
  <rect x="186" y="236" width="96"  height="14" rx="7" fill="#93c5fd"/>

  <!-- tools badge -->
  <circle cx="346" cy="326" r="58" fill="#1d4ed8"/>
  <circle cx="346" cy="326" r="50" fill="#ffffff"/>

  <!-- gear glyph inside badge -->
  <circle cx="346" cy="326" r="26" fill="none" stroke="#2563eb" stroke-width="11"
          stroke-dasharray="8.5 8.5"/>
  <circle cx="346" cy="326" r="8" fill="#2563eb"/>
</svg>
